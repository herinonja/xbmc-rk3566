name: Build Kodi Omega RK3566

on:
  workflow_dispatch:

  workflow_run:
    workflows:
      - Build RK3566 Dependencies
    types:
      - completed

  push:
    paths:
      - ".github/workflows/build-kodi-rk3566.yml"

jobs:
  build-kodi-rk3566:
    name: Build Kodi Omega RK3566 arm64 .deb
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      DEBIAN_FRONTEND: noninteractive
      PACKAGE_NAME: kodi-rk3566-omega
      PACKAGE_VERSION: 21.0-rk3566-trixie-17
      TARGET_ARCH: arm64
      CCACHE_DIR: /workspace/.ccache
      PKG_CONFIG_PATH: /usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib/aarch64-linux-gnu:/usr/local/lib:/usr/lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-kodi-rk3566-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/build-kodi-rk3566.yml') }}
          restore-keys: |
            ccache-kodi-rk3566-${{ runner.os }}-${{ runner.arch }}-
            ccache-kodi-rk3566-

      - name: Prepare workspace
        run: |
          mkdir -p .ccache output deps-artifact

      - name: Download RK3566 deps artifact from latest successful deps workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rk3566-deps.yml
          workflow_conclusion: success
          name: rk3566-trixie-deps-rootfs
          path: deps-artifact
          if_no_artifact_found: fail

      - name: Build Kodi inside Debian Trixie arm64
        run: |
          docker run --rm -i \
            --platform linux/arm64 \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e DEBIAN_FRONTEND="${DEBIAN_FRONTEND}" \
            -e PACKAGE_NAME="${PACKAGE_NAME}" \
            -e PACKAGE_VERSION="${PACKAGE_VERSION}" \
            -e TARGET_ARCH="${TARGET_ARCH}" \
            -e CCACHE_DIR="${CCACHE_DIR}" \
            -e PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
            -e LD_LIBRARY_PATH="${LD_LIBRARY_PATH}" \
            arm64v8/debian:trixie \
            bash -euxo pipefail -s <<'BASH'
          export PATH="/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          export CCACHE_DIR="/workspace/.ccache"
          export PKG_CONFIG="/usr/bin/pkg-config"
          export PKG_CONFIG_PATH="/usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig"
          export LD_LIBRARY_PATH="/usr/local/lib/aarch64-linux-gnu:/usr/local/lib:/usr/lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu"
          export CFLAGS="-I/usr/local/include -I/usr/include -I/usr/include/rga"
          export CXXFLAGS="-I/usr/local/include -I/usr/include -I/usr/include/rga"
          export LDFLAGS="-L/usr/local/lib/aarch64-linux-gnu -L/usr/local/lib -L/usr/lib/aarch64-linux-gnu -L/lib/aarch64-linux-gnu"

          apt-get update

          apt-get install -y --no-install-recommends \
            libc-bin \
            build-essential \
            git \
            ca-certificates \
            curl \
            wget \
            unzip \
            zip \
            xz-utils \
            zstd \
            file \
            patch \
            pkg-config \
            ccache \
            cmake \
            ninja-build \
            meson \
            autoconf \
            automake \
            autopoint \
            libtool \
            libtool-bin \
            gettext \
            gperf \
            yasm \
            nasm \
            swig \
            default-jre \
            python3 \
            python3-dev \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            dpkg-dev \
            fakeroot \
            debhelper \
            dh-make \
            devscripts \
            equivs \
            checkinstall \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            liblzo2-dev \
            libzstd-dev \
            libxml2-dev \
            libxslt1-dev \
            libsqlite3-dev \
            libmariadb-dev \
            libmariadb-dev-compat \
            libcurl4-openssl-dev \
            libass-dev \
            libbluray-dev \
            libcdio-dev \
            libcec-dev \
            libcrossguid-dev \
            libfmt-dev \
            libspdlog-dev \
            libgtest-dev \
            libfstrcmp-dev \
            libfribidi-dev \
            libgcrypt20-dev \
            libgif-dev \
            libgnutls28-dev \
            libiso9660-dev \
            libjpeg-dev \
            liblirc-dev \
            libmicrohttpd-dev \
            libnfs-dev \
            libogg-dev \
            libplist-dev \
            libpng-dev \
            libpulse-dev \
            libshairplay-dev \
            libsmbclient-dev \
            libtag1-dev \
            libtinyxml-dev \
            libtinyxml2-dev \
            libudev-dev \
            libunistring-dev \
            libva-dev \
            libvdpau-dev \
            libvorbis-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            uuid-dev \
            rapidjson-dev \
            flatbuffers-compiler \
            libflatbuffers-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libinput-dev \
            libdisplay-info-dev \
            libasound2-dev \
            libdbus-1-dev \
            libavahi-client-dev \
            libavahi-common-dev \
            libbluetooth-dev \
            libcap-dev \
            libdav1d-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libflac-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            liblcms2-dev \
            libltdl-dev \
            libmodplug-dev \
            libmp3lame-dev \
            libopenjp2-7-dev \
            libopus-dev \
            libp8-platform-dev \
            libsamplerate0-dev \
            libsndio-dev \
