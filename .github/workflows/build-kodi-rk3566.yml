            libxfixes-dev \
            libxrender-dev \
            libxt-dev \
            libxtst-dev \
            libx264-dev \
            libx265-dev \
            libvpx-dev

          echo "========== Extract RK3566 deps rootfs =========="
          ls -lh /workspace/deps-artifact
