name: Build Kodi Omega RK3566

on:
  workflow_dispatch:

  workflow_run:
    workflows:
      - Build RK3566 Dependencies
    types:
      - completed

  push:
    paths:
      - ".github/workflows/build-kodi-rk3566.yml"

jobs:
  build-kodi-rk3566:
    name: Build Kodi Omega RK3566 arm64 .deb
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      DEBIAN_FRONTEND: noninteractive
      PACKAGE_NAME: kodi-rk3566-omega
      PACKAGE_VERSION: 21.0-rk3566-trixie-17
      TARGET_ARCH: arm64
      CCACHE_DIR: /workspace/.ccache
      PKG_CONFIG_PATH: /usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib/aarch64-linux-gnu:/usr/local/lib:/usr/lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-kodi-rk3566-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/build-kodi-rk3566.yml') }}
          restore-keys: |
            ccache-kodi-rk3566-${{ runner.os }}-${{ runner.arch }}-
            ccache-kodi-rk3566-

      - name: Prepare workspace
        run: |
          mkdir -p .ccache output deps-artifact

      - name: Download RK3566 deps artifact from latest successful deps workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-rk3566-deps.yml
          workflow_conclusion: success
          name: rk3566-trixie-deps-rootfs
          path: deps-artifact
          if_no_artifact_found: fail

      - name: Build Kodi inside Debian Trixie arm64
        run: |
          docker run --rm -i \
            --platform linux/arm64 \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e DEBIAN_FRONTEND="${DEBIAN_FRONTEND}" \
            -e PACKAGE_NAME="${PACKAGE_NAME}" \
            -e PACKAGE_VERSION="${PACKAGE_VERSION}" \
            -e TARGET_ARCH="${TARGET_ARCH}" \
            -e CCACHE_DIR="${CCACHE_DIR}" \
            -e PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
            -e LD_LIBRARY_PATH="${LD_LIBRARY_PATH}" \
            arm64v8/debian:trixie \
            bash -euxo pipefail -s <<'BASH'
          export PATH="/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          export CCACHE_DIR="/workspace/.ccache"
          export PKG_CONFIG="/usr/bin/pkg-config"
          export PKG_CONFIG_PATH="/usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig"
          export LD_LIBRARY_PATH="/usr/local/lib/aarch64-linux-gnu:/usr/local/lib:/usr/lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu"
          export CFLAGS="-I/usr/local/include -I/usr/include -I/usr/include/rga"
          export CXXFLAGS="-I/usr/local/include -I/usr/include -I/usr/include/rga"
          export LDFLAGS="-L/usr/local/lib/aarch64-linux-gnu -L/usr/local/lib -L/usr/lib/aarch64-linux-gnu -L/lib/aarch64-linux-gnu"

          apt-get update

          apt-get install -y --no-install-recommends \
            libc-bin \
            build-essential \
            git \
            ca-certificates \
            curl \
            wget \
            unzip \
            zip \
            xz-utils \
            zstd \
            file \
            patch \
            pkg-config \
            ccache \
            cmake \
            ninja-build \
            meson \
            autoconf \
            automake \
            autopoint \
            libtool \
            libtool-bin \
            gettext \
            gperf \
            yasm \
            nasm \
            swig \
            default-jre \
            python3 \
            python3-dev \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            dpkg-dev \
            fakeroot \
            debhelper \
            dh-make \
            devscripts \
            equivs \
            checkinstall \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            liblzo2-dev \
            libzstd-dev \
            libxml2-dev \
            libxslt1-dev \
            libsqlite3-dev \
            libmariadb-dev \
            libmariadb-dev-compat \
            libcurl4-openssl-dev \
            libass-dev \
            libbluray-dev \
            libcdio-dev \
            libcec-dev \
            libcrossguid-dev \
            libfmt-dev \
            libspdlog-dev \
            libgtest-dev \
            libfstrcmp-dev \
            libfribidi-dev \
            libgcrypt20-dev \
            libgif-dev \
            libgnutls28-dev \
            libiso9660-dev \
            libjpeg-dev \
            liblirc-dev \
            libmicrohttpd-dev \
            libnfs-dev \
            libogg-dev \
            libplist-dev \
            libpng-dev \
            libpulse-dev \
            libshairplay-dev \
            libsmbclient-dev \
            libtag1-dev \
            libtinyxml-dev \
            libtinyxml2-dev \
            libudev-dev \
            libunistring-dev \
            libva-dev \
            libvdpau-dev \
            libvorbis-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            uuid-dev \
            rapidjson-dev \
            flatbuffers-compiler \
            libflatbuffers-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libinput-dev \
            libdisplay-info-dev \
            libasound2-dev \
            libdbus-1-dev \
            libavahi-client-dev \
            libavahi-common-dev \
            libbluetooth-dev \
            libcap-dev \
            libdav1d-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libflac-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            liblcms2-dev \
            libltdl-dev \
            libmodplug-dev \
            libmp3lame-dev \
            libopenjp2-7-dev \
            libopus-dev \
            libp8-platform-dev \
            libsamplerate0-dev \
            libsndio-dev \
            libspeex-dev \
            libtiff-dev \
            libuuid1 \
            libwebp-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxrender-dev \
            libxt-dev \
            libxtst-dev \
            libx264-dev \
            libx265-dev \
            libvpx-dev

          echo "========== Extract RK3566 deps rootfs =========="
          ls -lh /workspace/deps-artifact
          tar --zstd -xpf /workspace/deps-artifact/rk3566-trixie-deps-rootfs.tar.zst -C /tmp
          cp -a /tmp/deps-rootfs/. /

          /sbin/ldconfig || ldconfig || true

          echo "========== Verify imported ffmpeg-rockchip =========="
          command -v ffmpeg
          ffmpeg -hide_banner -decoders | grep -Ei "rkmpp|h264|hevc" || true
          ffmpeg -hide_banner -filters | grep -Ei "rga|scale" || true
          pkg-config --modversion libavcodec
          pkg-config --libs libavcodec

          echo "========== Build Kodi Omega =========="
          mkdir -p /build
          cd /build

          git clone --branch Omega --depth=1 https://github.com/xbmc/xbmc.git kodi
          cd kodi

          mkdir -p build
          cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCORE_PLATFORM_NAME=gbm \
            -DAPP_RENDER_SYSTEM=gles \
            -DENABLE_INTERNAL_FFMPEG=OFF \
            -DENABLE_INTERNAL_FLATBUFFERS=OFF \
            -DENABLE_INTERNAL_FMT=OFF \
            -DENABLE_INTERNAL_SPDLOG=OFF \
            -DENABLE_INTERNAL_CROSSGUID=OFF \
            -DENABLE_INTERNAL_FSTRCMP=OFF \
            -DENABLE_INTERNAL_RapidJSON=OFF \
            -DENABLE_AIRTUNES=ON \
            -DENABLE_AVAHI=ON \
            -DENABLE_BLUETOOTH=ON \
            -DENABLE_DBUS=ON \
            -DENABLE_OPTICAL=ON \
            -DENABLE_PULSEAUDIO=ON \
            -DENABLE_ALSA=ON \
            -DENABLE_INTERNAL_DAV1D=OFF \
            -DENABLE_TESTING=OFF \
            -DENABLE_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

          ninja -j"$(nproc)"

          echo "========== Install Kodi into package root =========="
          PKGROOT="/build/pkgroot"
          rm -rf "$PKGROOT"
          DESTDIR="$PKGROOT" ninja install

          echo "========== Add custom runtime libraries to package =========="
          mkdir -p "$PKGROOT/usr/local/lib"
          mkdir -p "$PKGROOT/usr/local/lib/aarch64-linux-gnu"
          mkdir -p "$PKGROOT/etc/ld.so.conf.d"

          cp -av /usr/local/lib/libpcre.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcre16.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcre32.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcreposix.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcrecpp.so* "$PKGROOT/usr/local/lib/" || true

          cp -av /usr/local/lib/libmpp* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/librockchip_mpp* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/aarch64-linux-gnu/libav*.so* "$PKGROOT/usr/local/lib/aarch64-linux-gnu/" || true
          cp -av /usr/local/lib/aarch64-linux-gnu/libsw*.so* "$PKGROOT/usr/local/lib/aarch64-linux-gnu/" || true
          cp -av /usr/local/lib/libav*.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libsw*.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/aarch64-linux-gnu/librga.so* "$PKGROOT/usr/local/lib/aarch64-linux-gnu/" || true

          printf '%s\n' \
            '/usr/local/lib/aarch64-linux-gnu' \
            '/usr/local/lib' \
            > "$PKGROOT/etc/ld.so.conf.d/kodi-rk3566.conf"

          echo "========== Create Debian package metadata =========="
          mkdir -p "$PKGROOT/DEBIAN"

          INSTALLED_SIZE="$(du -ks "$PKGROOT" | awk "{print \$1}")"

          printf '%s\n' \
            "Package: ${PACKAGE_NAME}" \
            "Version: ${PACKAGE_VERSION}" \
            "Section: video" \
            "Priority: optional" \
            "Architecture: ${TARGET_ARCH}" \
            "Installed-Size: ${INSTALLED_SIZE}" \
            "Maintainer: RK3566 Kodi Builder <builder@example.com>" \
            "Depends: libc6, libstdc++6, libgcc-s1, libdrm2, libgbm1, libegl1, libgles2, libasound2, libpulse0, libudev1, libdbus-1-3, libcurl4, libssl3, zlib1g, libsqlite3-0, libxml2, libxslt1.1, libpng16-16, libjpeg62-turbo, libfreetype6, libfontconfig1, libfribidi0, libharfbuzz0b, libfmt10, libspdlog1.15 | libspdlog1.12 | libspdlog1.10, libcrossguid0, libass9, libbluray2, libcdio19, libcec6, libmicrohttpd12, libnfs14, libsmbclient0, libtag1v5, libtinyxml2.6.2v5, libtinyxml2-10, libxkbcommon0, libinput10, libdisplay-info2, libavahi-client3, libavahi-common3, libbluetooth3, libcap2, libdav1d7, libdvdnav4, libdvdread8, libflac12, libgif7, liblzo2-2, libsamplerate0, libshairplay0, libvorbis0a, libvorbisenc2, libogg0, libmariadb3" \
            "Provides: kodi" \
            "Conflicts: kodi" \
            "Replaces: kodi" \
            "Description: Kodi Omega GBM/GLES for RK3566 with Rockchip MPP/RGA FFmpeg" \
            " Custom Debian Trixie arm64 Kodi Omega build for Radxa Zero 3W / RK3566." \
            " Built with external ffmpeg-rockchip, Rockchip MPP and librga support." \
            > "$PKGROOT/DEBIAN/control"

          printf '%s\n' \
            '#!/bin/sh' \
            'set -e' \
            '/sbin/ldconfig || ldconfig || true' \
            'exit 0' \
            > "$PKGROOT/DEBIAN/postinst"

          printf '%s\n' \
            '#!/bin/sh' \
            'set -e' \
            '/sbin/ldconfig || ldconfig || true' \
            'exit 0' \
            > "$PKGROOT/DEBIAN/postrm"

          chmod 0755 "$PKGROOT/DEBIAN/postinst" "$PKGROOT/DEBIAN/postrm"

          echo "========== Build .deb =========="
          mkdir -p /workspace/output
          dpkg-deb --build "$PKGROOT" "/workspace/output/${PACKAGE_NAME}_${PACKAGE_VERSION}_${TARGET_ARCH}.deb"

          echo "========== Package result =========="
          ls -lh /workspace/output/*.deb

          echo "========== ccache status after Kodi build =========="
          ccache --show-stats || true
          BASH

      - name: Verify Kodi package exists
        run: |
          ls -lah output
          test -n "$(find output -maxdepth 1 -name '*.deb' -print -quit)"

      - name: Upload Kodi RK3566 Debian package
        uses: actions/upload-artifact@v4
        with:
          name: kodi-rk3566-omega-trixie-arm64
          path: output/*.deb
          retention-days: 14
          if-no-files-found: error
