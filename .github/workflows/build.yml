name: Build Kodi Omega RK3566 DEB for Armbian Trixie

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build.yml"

jobs:
  build-kodi-deb:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Dockerfile
        run: |
          mkdir -p build-kodi-rk

          cat > build-kodi-rk/Dockerfile <<'EOF'
          FROM arm64v8/debian:trixie AS build

          SHELL ["/bin/bash", "-c"]

          ENV DEBIAN_FRONTEND=noninteractive
          ENV KODI_PREFIX=/usr/local/kodi-rk
          ENV FFMPEG_PREFIX=/usr/local/ffmpeg-rk
          ENV PKG_CONFIG_PATH=/usr/local/ffmpeg-rk/lib/pkgconfig:/usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
          ENV LD_LIBRARY_PATH=/usr/local/ffmpeg-rk/lib:/usr/local/lib:/usr/lib/aarch64-linux-gnu:/usr/lib
          ENV CMAKE_PREFIX_PATH=/usr/local:/usr/local/ffmpeg-rk:/usr

          RUN apt-get update && apt-get install -y --no-install-recommends \
              build-essential git cmake ninja-build pkg-config ccache \
              autoconf automake libtool libtool-bin gettext \
              ca-certificates curl wget unzip zip \
              python3 python3-dev python3-pip \
              yasm nasm gperf default-jre swig file patch meson \
              dpkg-dev fakeroot \
              flatbuffers-compiler libflatbuffers-dev rapidjson-dev \
              libdrm-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev \
              libdisplay-info-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev \
              libasound2-dev libpulse-dev libpipewire-0.3-dev \
              libudev-dev libinput-dev \
              libass-dev libavahi-client-dev libavahi-compat-libdnssd-dev \
              libbluetooth-dev libbluray-dev libcap-dev \
              libcdio-dev libcdio++-dev libiso9660-dev \
              libcec-dev libcurl4-openssl-dev libdav1d-dev libkrb5-dev \
              libdbus-1-dev libfmt-dev libspdlog-dev \
              libfreetype-dev libfribidi-dev \
              libgif-dev libgnutls28-dev libjpeg-dev \
              liblcms2-dev liblirc-dev liblzo2-dev libmicrohttpd-dev \
              libmariadb-dev libnfs-dev libpcre3-dev libpcre2-dev \
              libplist-dev libpng-dev libshairplay-dev libsmbclient-dev \
              libsndio-dev libsqlite3-dev libssl-dev libtag1-dev \
              libtinyxml-dev libtinyxml2-dev \
              libva-dev libvdpau-dev libxml2-dev libxslt1-dev \
              uuid-dev zlib1g-dev libsystemd-dev doxygen graphviz texinfo \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /opt/src

          RUN git clone --depth=1 https://github.com/rockchip-linux/mpp.git && \
              cmake -S mpp -B mpp/build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_INSTALL_LIBDIR=lib && \
              cmake --build mpp/build && \
              cmake --install mpp/build && \
              ldconfig

          RUN mkdir -p /usr/local/lib/pkgconfig && \
              printf '%s\n' \
                'prefix=/usr/local' \
                'exec_prefix=${prefix}' \
                'libdir=${prefix}/lib' \
                'includedir=${prefix}/include' \
                '' \
                'Name: rockchip_mpp' \
                'Description: Rockchip Media Process Platform' \
                'Version: 1.5.0' \
                'Libs: -L${libdir} -lrockchip_mpp' \
                'Cflags: -I${includedir}' \
                > /usr/local/lib/pkgconfig/rockchip_mpp.pc

          RUN git clone --depth=1 https://github.com/airockchip/librga.git && \
              mkdir -p /usr/local/include/rga /usr/local/lib/pkgconfig && \
              cp -a librga/include/* /usr/local/include/ || true && \
              cp -a librga/include/*.h /usr/local/include/rga/ || true && \
              cp -a librga/include/rga/* /usr/local/include/rga/ || true && \
              test -f /usr/local/include/rga/RgaApi.h && \
              RGA_SO="$(find librga/libs/Linux/gcc-aarch64 -name 'librga.so*' | head -n 1)" && \
              test -n "${RGA_SO}" && \
              cp -a "${RGA_SO}" /usr/local/lib/librga.so.2 && \
              ln -sf librga.so.2 /usr/local/lib/librga.so && \
              chmod 755 /usr/local/lib/librga.so* && \
              printf '%s\n' \
                'prefix=/usr/local' \
                'exec_prefix=${prefix}' \
                'libdir=${prefix}/lib' \
                'includedir=${prefix}/include' \
                '' \
                'Name: librga' \
                'Description: Rockchip RGA userspace library' \
                'Version: 2.2.0' \
                'Libs: -L${libdir} -lrga' \
                'Cflags: -I${includedir}' \
                > /usr/local/lib/pkgconfig/librga.pc && \
              ldconfig

          RUN git clone --depth=1 https://github.com/nyanmisaka/ffmpeg-rockchip.git ffmpeg-rockchip

          WORKDIR /opt/src/ffmpeg-rockchip

          RUN ./configure \
                --prefix=${FFMPEG_PREFIX} \
                --enable-gpl \
                --enable-version3 \
                --enable-libdrm \
                --enable-rkmpp \
                --enable-rkrga \
                --enable-shared \
                --disable-static \
                --disable-doc \
                --disable-debug \
              || { cat ffbuild/config.log; exit 1; }

          RUN make -j"$(nproc)" && \
              make install && \
              ldconfig && \
              ${FFMPEG_PREFIX}/bin/ffmpeg -version && \
              ${FFMPEG_PREFIX}/bin/ffmpeg -hwaccels || true

          WORKDIR /opt/src

          RUN git clone --depth=1 --branch Omega https://github.com/xbmc/xbmc.git kodi

          WORKDIR /opt/src/kodi

          RUN mkdir -p build && cd build && \
              set -o pipefail && \
              cmake .. -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=${KODI_PREFIX} \
                -DCORE_PLATFORM_NAME=gbm \
                -DAPP_RENDER_SYSTEM=gles \
                -DENABLE_INTERNAL_FFMPEG=OFF \
                -DFFMPEG_PATH=${FFMPEG_PREFIX} \
                -DENABLE_INTERNAL_FSTRCMP=ON \
                -DENABLE_NFS=ON \
                -DENABLE_OPTICAL=ON \
                -DENABLE_TESTING=OFF \
                2>&1 | tee /tmp/kodi-cmake.log || \
              { cat /tmp/kodi-cmake.log; exit 1; }

          RUN cd build && \
              ninja && \
              DESTDIR=/opt/kodi-rk-root ninja install

          RUN mkdir -p /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip && \
              cp -av ${FFMPEG_PREFIX}/lib/libavcodec.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av ${FFMPEG_PREFIX}/lib/libavformat.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av ${FFMPEG_PREFIX}/lib/libavfilter.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av ${FFMPEG_PREFIX}/lib/libavutil.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av ${FFMPEG_PREFIX}/lib/libswscale.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av ${FFMPEG_PREFIX}/lib/libswresample.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av ${FFMPEG_PREFIX}/lib/libpostproc.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av /usr/local/lib/librockchip_mpp.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/ && \
              cp -av /usr/local/lib/librga.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/rockchip/

          RUN cat > /opt/kodi-rk-root/usr/local/kodi-rk/bin/kodi-rk <<'EOS' && \
              chmod +x /opt/kodi-rk-root/usr/local/kodi-rk/bin/kodi-rk
          #!/bin/sh
          export KODI_HOME=/usr/local/kodi-rk
          unset PYTHONHOME
          unset PYTHONPATH
          export LD_LIBRARY_PATH="$KODI_HOME/lib/rockchip:$KODI_HOME/lib:${LD_LIBRARY_PATH}"
          exec "$KODI_HOME/lib/kodi/kodi-gbm" "$@"
          EOS

          RUN mkdir -p /opt/kodi-rk-root/usr/bin && \
              ln -sf /usr/local/kodi-rk/bin/kodi-rk /opt/kodi-rk-root/usr/bin/kodi-rk

          RUN mkdir -p /opt/kodi-rk-root/DEBIAN && \
              cat > /opt/kodi-rk-root/DEBIAN/control <<'EOF_CONTROL'
          Package: kodi-rk3566-omega
          Version: 21.0-rk3566-trixie-1
          Section: video
          Priority: optional
          Architecture: arm64
          Maintainer: herinonja
          Depends: libc6, libstdc++6, libgcc-s1, python3, avahi-daemon
          Description: Kodi Omega GBM/GLES for Radxa Zero 3W RK3566 on Armbian Trixie
           Kodi Omega built on Debian Trixie ARM64 for Armbian Trixie.
           Includes only Rockchip FFmpeg, MPP and RGA runtime libraries.
           Uses system libraries for GLIBC, Python, PipeWire, GBM, EGL, DRM and audio.
          EOF_CONTROL

          RUN cat > /opt/kodi-rk-root/DEBIAN/postinst <<'EOF_POSTINST' && \
              chmod 755 /opt/kodi-rk-root/DEBIAN/postinst
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl enable avahi-daemon >/dev/null 2>&1 || true
            systemctl start avahi-daemon >/dev/null 2>&1 || true
          fi
          exit 0
          EOF_POSTINST

          RUN dpkg-deb --build /opt/kodi-rk-root /out-kodi-rk3566-omega.deb && \
              mkdir -p /out && \
              mv /out-kodi-rk3566-omega.deb /out/kodi-rk3566-omega_21.0-rk3566-trixie-1_arm64.deb

          FROM scratch AS artifact
          COPY --from=build /out/ /
          EOF

      - name: Build ARM64 DEB artifact
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --target artifact \
            --progress=plain \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=local,dest=./output \
            ./build-kodi-rk

      - name: List output
        run: |
          find output -type f -print
          du -h output/*.deb || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodi-rk3566-omega-trixie-deb
          path: output/*.deb
