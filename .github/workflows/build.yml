name: Build Kodi Omega RK3566 with PPA Rockchip FFmpeg

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build.yml"

jobs:
  build-kodi:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Dockerfile
        run: |
          mkdir -p build-kodi-rk

          cat > build-kodi-rk/Dockerfile <<'EOF'
          FROM arm64v8/ubuntu:noble

          SHELL ["/bin/bash", "-c"]

          ENV DEBIAN_FRONTEND=noninteractive
          ENV PREFIX=/usr/local/kodi-rk
          ENV PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
          ENV LD_LIBRARY_PATH=/usr/local/lib:/usr/lib/aarch64-linux-gnu:/usr/lib
          ENV CMAKE_PREFIX_PATH=/usr/local:/usr

          RUN apt-get update && apt-get install -y --no-install-recommends \
              software-properties-common ca-certificates gnupg \
              && add-apt-repository -y ppa:liujianfeng1994/rockchip-multimedia \
              && apt-get update

          RUN apt-get install -y --no-install-recommends \
              build-essential git cmake ninja-build pkg-config ccache \
              autoconf automake libtool libtool-bin gettext \
              curl wget unzip zip python3 python3-dev python3-pip \
              yasm nasm gperf default-jre swig file patch meson \
              ffmpeg \
              libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
              libswscale-dev libswresample-dev libpostproc-dev \
              librga-dev librockchip-mpp-dev \
              libdrm-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev \
              libasound2-dev libpulse-dev libpipewire-0.3-dev \
              libudev-dev libinput-dev \
              libass-dev libavahi-client-dev libavahi-compat-libdnssd-dev \
              libbluetooth-dev libbluray-dev libcap-dev \
              libcdio-dev libcdio++-dev libiso9660-dev \
              libcec-dev libcurl4-openssl-dev libdav1d-dev libkrb5-dev \
              libdbus-1-dev libfmt-dev libfreetype-dev libfribidi-dev \
              libgif-dev libgnutls28-dev libjpeg-dev \
              liblcms2-dev liblirc-dev liblzo2-dev libmicrohttpd-dev \
              libmariadb-dev libnfs-dev libpcre2-dev \
              libplist-dev libpng-dev libshairplay-dev libsmbclient-dev \
              libsndio-dev libsqlite3-dev libssl-dev libtag1-dev \
              libtinyxml-dev libtinyxml2-dev \
              libva-dev libvdpau-dev libxml2-dev libxslt1-dev \
              uuid-dev zlib1g-dev libsystemd-dev doxygen graphviz texinfo \
              && rm -rf /var/lib/apt/lists/*

          RUN echo "===== FFmpeg from PPA =====" && \
              ffmpeg -version && \
              echo "===== HW accels =====" && \
              ffmpeg -hwaccels || true && \
              echo "===== RKMPP decoders =====" && \
              ffmpeg -decoders | grep -Ei 'rkmpp|h264|hevc|vp9' || true && \
              echo "===== RGA filters =====" && \
              ffmpeg -filters | grep -Ei 'rga|scale' || true && \
              echo "===== MPP/RGA pkg-config =====" && \
              pkg-config --modversion rockchip_mpp || true && \
              pkg-config --modversion librga || true

          WORKDIR /opt/src

          RUN git clone --depth=1 --branch Omega https://github.com/xbmc/xbmc.git kodi

          WORKDIR /opt/src/kodi

          RUN mkdir -p build && cd build && \
              set -o pipefail && \
              cmake .. -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=${PREFIX} \
                -DCORE_PLATFORM_NAME=gbm \
                -DAPP_RENDER_SYSTEM=gles \
                -DENABLE_X11=OFF \
                -DENABLE_WAYLAND=OFF \
                -DENABLE_INTERNAL_FFMPEG=OFF \
                -DFFMPEG_PATH=/usr \
                -DENABLE_INTERNAL_FLATBUFFERS=ON \
                -DENABLE_INTERNAL_FMT=OFF \
                -DENABLE_INTERNAL_SPDLOG=ON \
                -DENABLE_INTERNAL_CROSSGUID=ON \
                -DENABLE_INTERNAL_FSTRCMP=ON \
                -DENABLE_INTERNAL_RapidJSON=ON \
                -DENABLE_NFS=ON \
                -DENABLE_OPTICAL=ON \
                -DENABLE_AIRTUNES=ON \
                -DENABLE_AVAHI=ON \
                -DENABLE_UPNP=ON \
                -DENABLE_CEC=ON \
                -DENABLE_PULSEAUDIO=ON \
                -DENABLE_PIPEWIRE=ON \
                -DENABLE_BLUETOOTH=ON \
                2>&1 | tee /tmp/kodi-cmake.log || \
              { cat /tmp/kodi-cmake.log; cat CMakeFiles/CMakeError.log || true; exit 1; }

          RUN cd build && \
              ninja && \
              DESTDIR=/opt/kodi-rk-root ninja install

          RUN mkdir -p /out && \
              tar -C /opt/kodi-rk-root \
              -czf /out/kodi-omega-rk3566-ppa-rkmpp-rga-arm64.tar.gz .

          EOF

      - name: Build ARM64 Kodi with cache
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --progress=plain \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=local,dest=./output \
            ./build-kodi-rk

      - name: List output
        run: |
          find output -type f -print
          du -h output/**/*.tar.gz || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodi-omega-rk3566-ppa-rkmpp-rga-arm64
          path: output/**/*.tar.gz