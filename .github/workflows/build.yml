name: Build Kodi Omega RK3566 DEB

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build.yml"

jobs:
  build-kodi-deb:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Dockerfile
        run: |
          mkdir -p build-kodi-rk

          cat > build-kodi-rk/Dockerfile <<'EOF'
          FROM arm64v8/ubuntu:noble AS build

          SHELL ["/bin/bash", "-c"]

          ENV DEBIAN_FRONTEND=noninteractive
          ENV PREFIX=/usr/local/kodi-rk
          ENV PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
          ENV LD_LIBRARY_PATH=/usr/local/lib:/usr/lib/aarch64-linux-gnu:/usr/lib
          ENV CMAKE_PREFIX_PATH=/usr/local:/usr

          RUN apt-get update && apt-get install -y --no-install-recommends \
              software-properties-common ca-certificates gnupg \
              && add-apt-repository -y ppa:liujianfeng1994/rockchip-multimedia \
              && apt-get update

          RUN apt-get install -y --no-install-recommends \
              build-essential git cmake ninja-build pkg-config ccache \
              autoconf automake libtool libtool-bin gettext \
              curl wget unzip zip python3 python3-dev python3-pip \
              yasm nasm gperf default-jre swig file patch meson \
              dpkg-dev fakeroot file \
              flatbuffers-compiler libflatbuffers-dev rapidjson-dev \
              ffmpeg \
              libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
              libswscale-dev libswresample-dev libpostproc-dev \
              librga-dev librockchip-mpp-dev \
              libdrm-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev \
              libdisplay-info-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev \
              libasound2-dev libpulse-dev libpipewire-0.3-dev \
              libudev-dev libinput-dev \
              libass-dev libavahi-client-dev libavahi-compat-libdnssd-dev \
              libbluetooth-dev libbluray-dev libcap-dev \
              libcdio-dev libcdio++-dev libiso9660-dev \
              libcec-dev libcurl4-openssl-dev libdav1d-dev libkrb5-dev \
              libdbus-1-dev libfmt-dev libspdlog-dev \
              libfreetype-dev libfribidi-dev \
              libgif-dev libgnutls28-dev libjpeg-dev \
              liblcms2-dev liblirc-dev liblzo2-dev libmicrohttpd-dev \
              libmariadb-dev libnfs-dev libpcre3-dev libpcre2-dev \
              libplist-dev libpng-dev libshairplay-dev libsmbclient-dev \
              libsndio-dev libsqlite3-dev libssl-dev libtag1-dev \
              libtinyxml-dev libtinyxml2-dev \
              libva-dev libvdpau-dev libxml2-dev libxslt1-dev \
              uuid-dev zlib1g-dev libsystemd-dev doxygen graphviz texinfo \
              && rm -rf /var/lib/apt/lists/*

          RUN ffmpeg -version && \
              ffmpeg -hwaccels || true && \
              ffmpeg -decoders | grep -Ei 'rkmpp|h264|hevc|vp9' || true && \
              ffmpeg -filters | grep -Ei 'rga|scale' || true && \
              pkg-config --modversion rockchip_mpp || true && \
              pkg-config --modversion librga || true

          WORKDIR /opt/src

          RUN git clone --depth=1 --branch Omega https://github.com/xbmc/xbmc.git kodi

          WORKDIR /opt/src/kodi

          RUN mkdir -p build && cd build && \
              set -o pipefail && \
              cmake .. -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=${PREFIX} \
                -DCORE_PLATFORM_NAME=gbm \
                -DAPP_RENDER_SYSTEM=gles \
                -DENABLE_INTERNAL_FFMPEG=OFF \
                -DFFMPEG_PATH=/usr \
                -DENABLE_INTERNAL_FSTRCMP=ON \
                -DENABLE_NFS=ON \
                -DENABLE_OPTICAL=ON \
                -DENABLE_TESTING=OFF \
                2>&1 | tee /tmp/kodi-cmake.log || \
              { cat /tmp/kodi-cmake.log; exit 1; }

          RUN cd build && \
              ninja && \
              DESTDIR=/opt/kodi-rk-root ninja install

          RUN mkdir -p /opt/kodi-rk-root/usr/local/kodi-rk/lib/runtime && \
              ldd /opt/kodi-rk-root/usr/local/kodi-rk/lib/kodi/kodi-gbm \
                | awk '/=> \// { print $3 }' \
                | sort -u \
                | xargs -r -I{} cp -v {} /opt/kodi-rk-root/usr/local/kodi-rk/lib/runtime/ && \
              cp -av /usr/lib/aarch64-linux-gnu/libpython3.12.so* /opt/kodi-rk-root/usr/local/kodi-rk/lib/runtime/ || true && \
              cp -av /usr/lib/python3.12 /opt/kodi-rk-root/usr/local/kodi-rk/lib/runtime/python3.12 || true

          RUN cat > /opt/kodi-rk-root/usr/local/kodi-rk/bin/kodi-rk <<'EOS' && \
              chmod +x /opt/kodi-rk-root/usr/local/kodi-rk/bin/kodi-rk
          #!/bin/sh
          export KODI_HOME=/usr/local/kodi-rk
          export LD_LIBRARY_PATH="$KODI_HOME/lib/runtime:$KODI_HOME/lib:${LD_LIBRARY_PATH}"
          export PYTHONHOME="$KODI_HOME/lib/runtime/python3.12"
          exec "$KODI_HOME/lib/kodi/kodi-gbm" "$@"
          EOS

          RUN mkdir -p /opt/kodi-rk-root/usr/bin && \
              ln -sf /usr/local/kodi-rk/bin/kodi-rk /opt/kodi-rk-root/usr/bin/kodi-rk

          RUN mkdir -p /opt/kodi-rk-root/DEBIAN && \
              cat > /opt/kodi-rk-root/DEBIAN/control <<'EOF_CONTROL'
          Package: kodi-rk3566-omega
          Version: 21.0-rk3566-1
          Section: video
          Priority: optional
          Architecture: arm64
          Maintainer: herinonja
          Depends: libc6, libstdc++6, libgcc-s1, ffmpeg, avahi-daemon
          Description: Kodi Omega GBM/GLES for RK3566 with Rockchip FFmpeg runtime bundle
           Custom Kodi Omega build for Radxa Zero 3W / RK3566.
           Built against Rockchip FFmpeg, MPP and RGA userspace libraries.
           Runtime libraries are bundled under /usr/local/kodi-rk/lib/runtime.
          EOF_CONTROL

          RUN cat > /opt/kodi-rk-root/DEBIAN/postinst <<'EOF_POSTINST' && \
              chmod 755 /opt/kodi-rk-root/DEBIAN/postinst
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl enable avahi-daemon >/dev/null 2>&1 || true
            systemctl start avahi-daemon >/dev/null 2>&1 || true
          fi
          exit 0
          EOF_POSTINST

          RUN dpkg-deb --build /opt/kodi-rk-root /out-kodi-rk3566-omega.deb && \
              mkdir -p /out && \
              mv /out-kodi-rk3566-omega.deb /out/kodi-rk3566-omega_21.0-rk3566-1_arm64.deb

          FROM scratch AS artifact
          COPY --from=build /out/ /
          EOF

      - name: Build ARM64 DEB artifact
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --target artifact \
            --progress=plain \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=local,dest=./output \
            ./build-kodi-rk

      - name: List output
        run: |
          find output -type f -print
          du -h output/*.deb || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodi-rk3566-omega-deb
          path: output/*.deb
