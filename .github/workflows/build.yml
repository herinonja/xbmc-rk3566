name: Build Kodi Omega Rockchip RKMPP/RGA for Radxa Zero 3W

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build.yml"

jobs:
  build-kodi-rockchip:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Dockerfile
        run: |
          mkdir -p build-kodi-rk

          cat > build-kodi-rk/Dockerfile <<'EOF'
          FROM arm64v8/debian:bookworm

          ENV DEBIAN_FRONTEND=noninteractive
          ENV PREFIX=/usr/local/kodi-rk
          ENV MAKEFLAGS="-j$(nproc)"
          ENV PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

          RUN apt-get update && apt-get install -y --no-install-recommends \
              build-essential git cmake ninja-build pkg-config ccache \
              autoconf automake libtool gettext ca-certificates \
              curl wget unzip zip python3 python3-dev python3-pip \
              yasm nasm gperf default-jre swig \
              libdrm-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev \
              libasound2-dev libpulse-dev libudev-dev libinput-dev \
              libavahi-client-dev libbluetooth-dev libbluray-dev \
              libcdio-dev libcec-dev libcurl4-openssl-dev \
              libdbus-1-dev libfmt-dev libfreetype-dev libfribidi-dev \
              libgif-dev libgnutls28-dev libiso9660-dev libjpeg-dev \
              liblcms2-dev liblirc-dev liblzo2-dev libmicrohttpd-dev \
              libmariadb-dev libnfs-dev libpcre2-dev libplist-dev \
              libpng-dev libshairplay-dev libsmbclient-dev libsqlite3-dev \
              libssl-dev libtag1-dev libtinyxml-dev libtinyxml2-dev \
              libudev-dev libva-dev libvdpau-dev libxml2-dev libxslt1-dev \
              uuid-dev zlib1g-dev && \
              rm -rf /var/lib/apt/lists/*

          WORKDIR /opt/src

          RUN git clone --depth=1 https://github.com/rockchip-linux/mpp.git && \
              cmake -S mpp -B mpp/build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr && \
              cmake --build mpp/build && \
              cmake --install mpp/build && \
              ldconfig

          RUN git clone --depth=1 https://github.com/airockchip/librga.git && \
              cmake -S librga -B librga/build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr && \
              cmake --build librga/build || true && \
              cmake --install librga/build || true

          RUN mkdir -p /usr/include/rga /usr/lib/aarch64-linux-gnu/pkgconfig && \
              cp -a librga/include/* /usr/include/ || true && \
              if [ -f librga/libs/Linux/gcc-aarch64/librga.so ]; then \
                cp -a librga/libs/Linux/gcc-aarch64/librga.so /usr/lib/aarch64-linux-gnu/; \
              fi && \
              if [ ! -f /usr/lib/aarch64-linux-gnu/pkgconfig/librga.pc ]; then \
                printf '%s\n' \
                  'prefix=/usr' \
                  'exec_prefix=${prefix}' \
                  'libdir=/usr/lib/aarch64-linux-gnu' \
                  'includedir=${prefix}/include' \
                  '' \
                  'Name: librga' \
                  'Description: Rockchip RGA userspace library' \
                  'Version: 1.10.0' \
                  'Libs: -L${libdir} -lrga' \
                  'Cflags: -I${includedir}' \
                  > /usr/lib/aarch64-linux-gnu/pkgconfig/librga.pc; \
              fi && \
              ldconfig && \
              pkg-config --exists librga

          RUN pkg-config --exists rockchip_mpp || pkg-config --exists mpp

          RUN git clone --depth=1 https://github.com/nyanmisaka/ffmpeg-rockchip.git ffmpeg-rockchip && \
              cd ffmpeg-rockchip && \
              ./configure \
                --prefix=/usr \
                --enable-gpl \
                --enable-version3 \
                --enable-libdrm \
                --enable-rkmpp \
                --enable-rkrga \
                --enable-shared \
                --disable-static \
                --disable-doc \
                --disable-debug && \
              make -j$(nproc) && \
              make install && \
              ldconfig && \
              ffmpeg -hwaccels | grep -i rkmpp

          RUN git clone --depth=1 --branch Omega https://github.com/xbmc/xbmc.git kodi

          WORKDIR /opt/src/kodi

          RUN mkdir -p build && cd build && \
              cmake .. -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=${PREFIX} \
                -DCORE_PLATFORM_NAME=gbm \
                -DAPP_RENDER_SYSTEM=gles \
                -DENABLE_X11=OFF \
                -DENABLE_WAYLAND=OFF \
                -DENABLE_INTERNAL_FFMPEG=OFF \
                -DFFMPEG_PATH=/usr \
                -DENABLE_INTERNAL_FLATBUFFERS=ON \
                -DENABLE_INTERNAL_FMT=OFF \
                -DENABLE_INTERNAL_SPDLOG=ON \
                -DENABLE_INTERNAL_CROSSGUID=ON \
                -DENABLE_INTERNAL_FSTRCMP=ON \
                -DENABLE_INTERNAL_RapidJSON=ON && \
              ninja && \
              DESTDIR=/opt/kodi-rk-root ninja install

          RUN mkdir -p /out && \
              tar -C /opt/kodi-rk-root -czf /out/kodi-omega-rk3566-rkmpp-rga-arm64.tar.gz .
          EOF

      - name: Build ARM64 image and export artifact
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --output type=local,dest=./output \
            ./build-kodi-rk

      - name: List output
        run: |
          find output -type f -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodi-omega-rk3566-rkmpp-rga-arm64
          path: output/**/*.tar.gz
