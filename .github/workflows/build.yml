name: Build Kodi Omega RK3566 Debian Trixie

on:
  workflow_dispatch:

  push:
    paths:
      - ".github/workflows/build.yml"

jobs:
  build-kodi-rk3566:
    name: Build Kodi Omega RK3566 arm64 .deb
    runs-on: ubuntu-24.04

    env:
      DEBIAN_FRONTEND: noninteractive
      PACKAGE_NAME: kodi-rk3566-omega
      PACKAGE_VERSION: 21.0-rk3566-trixie-7
      TARGET_ARCH: arm64
      INSTALL_PREFIX: /usr/local
      MAKEFLAGS: -j2
      CCACHE_DIR: /workspace/.ccache
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig
      LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib/aarch64-linux-gnu

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-kodi-rk3566-trixie-${{ github.run_id }}
          restore-keys: |
            ccache-kodi-rk3566-trixie-

      - name: Prepare workspace
        run: |
          mkdir -p .ccache output

      - name: Build everything inside Debian Trixie arm64
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e DEBIAN_FRONTEND="${DEBIAN_FRONTEND}" \
            -e PACKAGE_NAME="${PACKAGE_NAME}" \
            -e PACKAGE_VERSION="${PACKAGE_VERSION}" \
            -e TARGET_ARCH="${TARGET_ARCH}" \
            -e INSTALL_PREFIX="${INSTALL_PREFIX}" \
            -e MAKEFLAGS="${MAKEFLAGS}" \
            -e CCACHE_DIR="${CCACHE_DIR}" \
            -e PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
            -e LD_LIBRARY_PATH="${LD_LIBRARY_PATH}" \
            arm64v8/debian:trixie \
            bash -euxo pipefail -c '

          export PATH="/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          export CCACHE_DIR="/workspace/.ccache"
          export PKG_CONFIG="/usr/bin/pkg-config"
          export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:/usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig"
          export LD_LIBRARY_PATH="/usr/local/lib:/usr/local/lib/aarch64-linux-gnu"
          export CFLAGS="-I/usr/local/include -I/usr/local/include/rga"
          export CXXFLAGS="-I/usr/local/include -I/usr/local/include/rga"
          export LDFLAGS="-L/usr/local/lib -L/usr/local/lib/aarch64-linux-gnu"

          apt-get update

          apt-get install -y --no-install-recommends \
            libc-bin \
            build-essential \
            git \
            ca-certificates \
            curl \
            wget \
            unzip \
            zip \
            xz-utils \
            file \
            patch \
            pkg-config \
            ccache \
            cmake \
            ninja-build \
            meson \
            autoconf \
            automake \
            autopoint \
            libtool \
            libtool-bin \
            gettext \
            gperf \
            yasm \
            nasm \
            swig \
            default-jre \
            python3 \
            python3-dev \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            dpkg-dev \
            fakeroot \
            debhelper \
            dh-make \
            checkinstall \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            liblzo2-dev \
            libzstd-dev \
            libxml2-dev \
            libxslt1-dev \
            libsqlite3-dev \
            libmariadb-dev \
            libmariadb-dev-compat \
            libcurl4-openssl-dev \
            libass-dev \
            libbluray-dev \
            libcdio-dev \
            libcec-dev \
            libcrossguid-dev \
            libfmt-dev \
            libfstrcmp-dev \
            libfribidi-dev \
            libgcrypt20-dev \
            libgif-dev \
            libgnutls28-dev \
            libiso9660-dev \
            libjpeg-dev \
            liblirc-dev \
            libmicrohttpd-dev \
            libnfs-dev \
            libogg-dev \
            libplist-dev \
            libpng-dev \
            libpulse-dev \
            libshairplay-dev \
            libsmbclient-dev \
            libtag1-dev \
            libtinyxml-dev \
            libtinyxml2-dev \
            libudev-dev \
            libunistring-dev \
            libva-dev \
            libvdpau-dev \
            libvorbis-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            uuid-dev \
            rapidjson-dev \
            flatbuffers-compiler \
            libflatbuffers-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libinput-dev \
            libdisplay-info-dev \
            libasound2-dev \
            libdbus-1-dev \
            libavahi-client-dev \
            libavahi-common-dev \
            libbluetooth-dev \
            libcap-dev \
            libdav1d-dev \
            libdvdnav-dev \
            libdvdread-dev \
            libflac-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            liblcms2-dev \
            libltdl-dev \
            libmodplug-dev \
            libmp3lame-dev \
            libopenjp2-7-dev \
            libopus-dev \
            libp8-platform-dev \
            libsamplerate0-dev \
            libsndio-dev \
            libspeex-dev \
            libtiff-dev \
            libuuid1 \
            libwebp-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxrender-dev \
            libxt-dev \
            libxtst-dev \
            libx264-dev \
            libx265-dev \
            libvpx-dev

          command -v ldconfig || true
          ls -l /sbin/ldconfig /usr/sbin/ldconfig 2>/dev/null || true

          mkdir -p /build
          cd /build

          echo "========== ccache status before build =========="
          ccache --zero-stats || true
          ccache --show-stats || true

          echo "========== Build and install PCRE 8.45 =========="
          wget -O pcre-8.45.tar.gz https://downloads.sourceforge.net/project/pcre/pcre/8.45/pcre-8.45.tar.gz
          tar xf pcre-8.45.tar.gz
          cd pcre-8.45

          ./configure \
            --prefix=/usr/local \
            --enable-shared \
            --disable-static \
            --enable-utf \
            --enable-unicode-properties \
            --enable-pcre16 \
            --enable-pcre32

          make -j2
          make install

          /sbin/ldconfig || ldconfig || true

          pkg-config --modversion libpcre || pkg-config --modversion pcre
          ls -l /usr/local/lib/libpcre* || true

          cd /build

          echo "========== Build and install Rockchip MPP =========="
          git clone --depth=1 https://github.com/rockchip-linux/mpp.git
          cd mpp

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

          cmake --build build -j2
          cmake --install build

          /sbin/ldconfig || ldconfig || true

          pkg-config --modversion rockchip_mpp || true
          pkg-config --libs rockchip_mpp || true
          ls -l /usr/local/lib/libmpp* /usr/local/lib/librockchip_mpp* 2>/dev/null || true

          cd /build

          echo "========== Install Rockchip librga =========="
          git clone --depth=1 https://github.com/airockchip/librga.git
          cd librga

          echo "Repository RGA layout:"
          find . -maxdepth 6 -type f | sort | head -400

          echo "Searching for Linux arm64 librga.so..."
          RGA_SO="$(find . -type f \( -name "librga.so" -o -name "librga.so.*" \) | grep -Ei "/libs/Linux/.*/(aarch64|arm64|gcc-aarch64|arm64-v8a)/" | head -n1 || true)"

          if [ -z "$RGA_SO" ]; then
            RGA_SO="$(find . -type f \( -name "librga.so" -o -name "librga.so.*" \) | grep -Ei "/libs/Linux/" | head -n1 || true)"
          fi

          if [ -z "$RGA_SO" ]; then
            echo "ERROR: No Linux librga.so found in airockchip/librga."
            echo "Full library search:"
            find . -type f | grep -Ei "librga|rga.*\\.so|\\.so$|\\.a$" || true
            exit 1
          fi

          echo "Using RGA library: $RGA_SO"
          file "$RGA_SO" || true

          mkdir -p /usr/local/include
          mkdir -p /usr/local/include/rga
          mkdir -p /usr/local/lib
          mkdir -p /usr/local/lib/aarch64-linux-gnu
          mkdir -p /usr/local/lib/pkgconfig
          mkdir -p /usr/local/lib/aarch64-linux-gnu/pkgconfig

          cp -av include/*.h /usr/local/include/
          cp -av include/*.hpp /usr/local/include/ || true
          cp -av include/*.h /usr/local/include/rga/
          cp -av include/*.hpp /usr/local/include/rga/ || true

          cp -av "$RGA_SO" /usr/local/lib/librga.so
          cp -av "$RGA_SO" /usr/local/lib/aarch64-linux-gnu/librga.so

          chmod 0644 /usr/local/lib/librga.so || true
          chmod 0644 /usr/local/lib/aarch64-linux-gnu/librga.so || true

          if find . -type f -name "librga.a" | grep -q .; then
            RGA_A="$(find . -type f -name "librga.a" | grep -Ei "/libs/Linux/" | head -n1 || true)"
            if [ -n "$RGA_A" ]; then
              cp -av "$RGA_A" /usr/local/lib/librga.a || true
              cp -av "$RGA_A" /usr/local/lib/aarch64-linux-gnu/librga.a || true
            fi
          fi

          cat > /tmp/librga.pc <<EOF_RGA_PC
          prefix=/usr/local
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          
          Name: librga
          Description: Rockchip RGA userspace library
          Version: 2.3.0
          Libs: -L\${libdir} -lrga
          Libs.private: -ldl -lpthread
          Cflags: -I\${includedir} -I\${includedir}/rga
          EOF_RGA_PC

          cp -av /tmp/librga.pc /usr/local/lib/pkgconfig/librga.pc
          cp -av /tmp/librga.pc /usr/local/lib/pkgconfig/rga.pc
          cp -av /tmp/librga.pc /usr/local/lib/aarch64-linux-gnu/pkgconfig/librga.pc
          cp -av /tmp/librga.pc /usr/local/lib/aarch64-linux-gnu/pkgconfig/rga.pc

          /sbin/ldconfig || ldconfig || true

          echo "========== Verify librga pkg-config =========="
          export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:/usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig"
          pkg-config --debug --exists librga 2>&1 | tail -80 || true
          pkg-config --exists librga
          pkg-config --modversion librga
          pkg-config --cflags librga
          pkg-config --libs librga
          pkg-config --exists rga
          pkg-config --modversion rga
          pkg-config --cflags rga
          pkg-config --libs rga

          echo "========== Verify RGA compile/link test =========="
          cat > /tmp/test-rga.c <<EOF_RGA_TEST
          #include <stdio.h>
          #include <rga.h>
          #include <RgaApi.h>
          #include <im2d.h>
          int main(void) {
            printf("rga headers ok\n");
            return 0;
          }
          EOF_RGA_TEST

          gcc /tmp/test-rga.c -o /tmp/test-rga $(pkg-config --cflags --libs librga)
          /tmp/test-rga || true

          ls -l /usr/local/lib/librga* /usr/local/lib/aarch64-linux-gnu/librga* || true
          ls -l /usr/local/lib/pkgconfig/*rga.pc /usr/local/lib/aarch64-linux-gnu/pkgconfig/*rga.pc || true

          cd /build

          echo "========== Build and install ffmpeg-rockchip =========="
          git clone --depth=1 https://github.com/nyanmisaka/ffmpeg-rockchip.git
          cd ffmpeg-rockchip

          export PKG_CONFIG="/usr/bin/pkg-config"
          export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:/usr/local/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig"
          export LD_LIBRARY_PATH="/usr/local/lib:/usr/local/lib/aarch64-linux-gnu"
          export CFLAGS="-I/usr/local/include -I/usr/local/include/rga"
          export CXXFLAGS="-I/usr/local/include -I/usr/local/include/rga"
          export LDFLAGS="-L/usr/local/lib -L/usr/local/lib/aarch64-linux-gnu"

          echo "pkg-config final check before ffmpeg configure:"
          pkg-config --exists librga
          pkg-config --modversion librga
          pkg-config --cflags --libs librga

          if ! ./configure \
            --prefix=/usr/local \
            --extra-cflags="-I/usr/local/include -I/usr/local/include/rga" \
            --extra-ldflags="-L/usr/local/lib -L/usr/local/lib/aarch64-linux-gnu" \
            --extra-libs="-lpthread -lm -ldl" \
            --enable-gpl \
            --enable-version3 \
            --enable-shared \
            --disable-static \
            --disable-debug \
            --enable-libdrm \
            --enable-rkmpp \
            --enable-rkrga \
            --enable-libdav1d \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libvpx \
            --enable-libopus \
            --enable-libvorbis \
            --enable-libmp3lame \
            --enable-openssl; then
            echo "========== ffmpeg configure failed; showing librga-related config.log =========="
            grep -n -i -A8 -B8 "rga\|librga\|pkg-config" ffbuild/config.log || true
            tail -200 ffbuild/config.log || true
            exit 1
          fi

          make -j2
          make install

          /sbin/ldconfig || ldconfig || true

          ffmpeg -hide_banner -decoders | grep -Ei "rkmpp|h264|hevc" || true
          ffmpeg -hide_banner -filters | grep -Ei "rga|scale" || true
          pkg-config --modversion libavcodec
          pkg-config --libs libavcodec

          cd /build

          echo "========== Build Kodi Omega =========="
          git clone --branch Omega --depth=1 https://github.com/xbmc/xbmc.git kodi
          cd kodi

          mkdir -p build
          cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCORE_PLATFORM_NAME=gbm \
            -DAPP_RENDER_SYSTEM=gles \
            -DENABLE_X11=OFF \
            -DENABLE_WAYLAND=OFF \
            -DENABLE_INTERNAL_FFMPEG=OFF \
            -DENABLE_INTERNAL_FLATBUFFERS=OFF \
            -DENABLE_INTERNAL_FMT=OFF \
            -DENABLE_INTERNAL_CROSSGUID=OFF \
            -DENABLE_INTERNAL_FSTRCMP=OFF \
            -DENABLE_INTERNAL_RapidJSON=OFF \
            -DENABLE_AIRTUNES=ON \
            -DENABLE_AVAHI=ON \
            -DENABLE_BLUETOOTH=ON \
            -DENABLE_DBUS=ON \
            -DENABLE_OPTICAL=ON \
            -DENABLE_PULSEAUDIO=ON \
            -DENABLE_ALSA=ON \
            -DENABLE_INTERNAL_DAV1D=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

          ninja -j2

          echo "========== Install Kodi into package root =========="
          PKGROOT="/build/pkgroot"
          rm -rf "$PKGROOT"
          DESTDIR="$PKGROOT" ninja install

          echo "========== Add custom runtime libraries to package =========="
          mkdir -p "$PKGROOT/usr/local/lib"
          mkdir -p "$PKGROOT/etc/ld.so.conf.d"

          cp -av /usr/local/lib/libpcre.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcre16.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcre32.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcreposix.so* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/libpcrecpp.so* "$PKGROOT/usr/local/lib/" || true

          cp -av /usr/local/lib/libmpp* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/librockchip_mpp* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/librga* "$PKGROOT/usr/local/lib/" || true
          cp -av /usr/local/lib/aarch64-linux-gnu/librga* "$PKGROOT/usr/local/lib/" || true

          cat > "$PKGROOT/etc/ld.so.conf.d/kodi-rk3566.conf" <<EOF_LD_CONF
          /usr/local/lib
          /usr/local/lib/aarch64-linux-gnu
          EOF_LD_CONF
          
                    echo "========== Create Debian package metadata =========="
                    mkdir -p "$PKGROOT/DEBIAN"
          
                    INSTALLED_SIZE="$(du -ks "$PKGROOT" | awk "{print \$1}")"
          
                    cat > "$PKGROOT/DEBIAN/control" <<EOF_CONTROL
          Package: ${PACKAGE_NAME}
          Version: ${PACKAGE_VERSION}
          Section: video
          Priority: optional
          Architecture: ${TARGET_ARCH}
          Installed-Size: ${INSTALLED_SIZE}
          Maintainer: RK3566 Kodi Builder <builder@example.com>
          Depends: libc6, libstdc++6, libgcc-s1, libdrm2, libgbm1, libegl1, libgles2, libasound2, libpulse0, libudev1, libdbus-1-3, libcurl4, libssl3, zlib1g, libsqlite3-0, libxml2, libxslt1.1, libpng16-16, libjpeg62-turbo, libfreetype6, libfontconfig1, libfribidi0, libharfbuzz0b, libfmt10, libcrossguid0, libass9, libbluray2, libcdio19, libcec6, libmicrohttpd12, libnfs14, libsmbclient0, libtag1v5, libtinyxml2.6.2v5, libtinyxml2-10, libxkbcommon0, libinput10, libdisplay-info2, libavahi-client3, libavahi-common3, libbluetooth3, libcap2, libdav1d7, libdvdnav4, libdvdread8, libflac12, libgif7, liblzo2-2, libsamplerate0, libshairplay0, libvorbis0a, libvorbisenc2, libogg0, libmariadb3
          Provides: kodi
          Conflicts: kodi
          Replaces: kodi
          Description: Kodi Omega GBM/GLES for RK3566 with Rockchip MPP/RGA FFmpeg
           Custom Debian Trixie arm64 Kodi Omega build for Radxa Zero 3W / RK3566.
           Built with external ffmpeg-rockchip, Rockchip MPP and librga support.
          EOF_CONTROL
          
                    cat > "$PKGROOT/DEBIAN/postinst" <<EOF_POSTINST
          #!/bin/sh
          set -e
          /sbin/ldconfig || ldconfig || true
          exit 0
          EOF_POSTINST
          
                    cat > "$PKGROOT/DEBIAN/postrm" <<EOF_POSTRM
          #!/bin/sh
          set -e
          /sbin/ldconfig || ldconfig || true
          exit 0
          EOF_POSTRM

          chmod 0755 "$PKGROOT/DEBIAN/postinst" "$PKGROOT/DEBIAN/postrm"

          echo "========== Build .deb =========="
          mkdir -p /workspace/output
          dpkg-deb --build "$PKGROOT" "/workspace/output/${PACKAGE_NAME}_${PACKAGE_VERSION}_${TARGET_ARCH}.deb"

          echo "========== Package result =========="
          ls -lh /workspace/output/*.deb

          echo "========== ccache status after build =========="
          ccache --show-stats || true

          '

      - name: Upload Kodi RK3566 Debian package
        uses: actions/upload-artifact@v4
        with:
          name: kodi-rk3566-omega-trixie-arm64
          path: output/*.deb
          if-no-files-found: error
